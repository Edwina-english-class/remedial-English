<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>句子重組大冒險</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF8EC;
    --sun:#FFCF56;
    --sun-dark:#F2A93B;
    --mint:#8FE1C8;
    --mint-dark:#4FC79E;
    --coral:#FF9AA6;
    --coral-dark:#F4707F;
    --sky:#8FCFF2;
    --sky-dark:#5AAEDD;
    --ink:#5A4636;
    --ink-soft:#8A7A68;
    --white:#FFFFFF;
    --shadow: 0 6px 0 rgba(90,70,54,0.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Noto Sans TC','Baloo 2',sans-serif;
    background:
      radial-gradient(circle at 10% 10%, #FFE9C2 0%, transparent 40%),
      radial-gradient(circle at 90% 20%, #C9F2E4 0%, transparent 40%),
      radial-gradient(circle at 80% 90%, #FFD7DC 0%, transparent 45%),
      var(--cream);
    color:var(--ink);
    min-height:100vh;
    padding:24px 16px 60px;
    position:relative;
    overflow-x:hidden;
  }
  .cloud{
    position:absolute; opacity:0.7; pointer-events:none;
  }
  h1,h2,h3{font-family:'Baloo 2',sans-serif; margin:0;}
  .app{max-width:820px; margin:0 auto; position:relative; z-index:1;}

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:18px;
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    font-family:'Baloo 2',sans-serif; font-weight:800; font-size:22px;
    color:var(--ink);
  }
  .brand-badge{
    width:42px; height:42px; border-radius:14px;
    background:linear-gradient(160deg,var(--sun),var(--coral));
    display:flex; align-items:center; justify-content:center;
    font-size:22px; box-shadow:var(--shadow);
  }
  /* ---------- Cards ---------- */
  .card{
    background:var(--white);
    border-radius:28px;
    padding:32px 28px;
    box-shadow: 0 14px 0 rgba(90,70,54,0.10), 0 4px 18px rgba(90,70,54,0.08);
    border:3px solid #FBEFDC;
  }

  /* ---------- Login screen ---------- */
  .login-hero{ text-align:center; margin-bottom:22px;}
  .login-hero .mascot{font-size:56px; display:block; margin-bottom:6px;}
  .login-hero h2{font-size:26px; color:var(--ink); margin-bottom:6px;}
  .login-hero p{color:var(--ink-soft); font-size:14px; margin:0;}
  .field{margin-bottom:16px;}
  .field label{
    display:block; font-weight:700; font-size:14px; margin-bottom:6px; color:var(--ink);
  }
  .field input{
    width:100%; padding:13px 16px; border-radius:16px;
    border:2.5px solid #F0E3CE; font-size:16px;
    font-family:'Noto Sans TC',sans-serif;
    background:#FFFCF6;
    outline:none; transition:.15s;
  }
  .field input:focus{border-color:var(--sky-dark); background:var(--white);}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    font-family:'Baloo 2',sans-serif; font-weight:700; font-size:17px;
    border:none; border-radius:18px; cursor:pointer; padding:14px 20px;
    transition:transform .1s ease, box-shadow .1s ease;
    color:var(--white);
  }
  .btn:active{transform:translateY(3px); box-shadow:none !important;}
  .btn-primary{background:linear-gradient(160deg,var(--mint),var(--mint-dark)); box-shadow:0 5px 0 #38A87F; width:100%;}
  .btn-secondary{background:linear-gradient(160deg,var(--sky),var(--sky-dark)); box-shadow:0 5px 0 #3E8FBE;}
  .btn-coral{background:linear-gradient(160deg,var(--coral),var(--coral-dark)); box-shadow:0 5px 0 #DE5566;}
  .btn-outline{background:var(--white); color:var(--ink-soft); border:2.5px solid #EFE3D3; box-shadow:none;}
  .error-msg{color:var(--coral-dark); font-size:13px; font-weight:700; margin-top:-8px; margin-bottom:14px; display:none;}

  /* ---------- Game screen ---------- */
  .progress-wrap{display:flex; align-items:center; gap:12px; margin-bottom:18px;}
  .progress-track{
    flex:1; height:16px; background:#F3E9D6; border-radius:999px; overflow:hidden;
    border:2px solid #EEDFC5;
  }
  .progress-fill{
    height:100%; background:linear-gradient(90deg,var(--sun),var(--coral));
    border-radius:999px; transition:width .35s ease;
  }
  .progress-label{font-weight:800; font-family:'Baloo 2',sans-serif; color:var(--ink-soft); font-size:14px; white-space:nowrap;}

  .hint-box{
    background:#FFF6E4; border:2px dashed var(--sun-dark); border-radius:18px;
    padding:14px 18px; margin-bottom:20px; text-align:center;
  }
  .hint-box .hint-label{font-size:12px; font-weight:800; color:var(--sun-dark); letter-spacing:1px;}
  .hint-box .hint-text{font-size:17px; font-weight:700; color:var(--ink); margin-top:4px;}

  .slots{
    display:flex; flex-wrap:wrap; gap:10px; justify-content:center;
    min-height:66px; padding:14px; margin-bottom:22px;
    background:#F7FBFB; border-radius:18px; border:2.5px solid #E4F3EF;
  }
  .slot{
    min-width:78px; min-height:46px; border-radius:14px;
    border:2.5px dashed #C9E6DE; display:flex; align-items:center; justify-content:center;
    font-size:14px; color:#B7CFC7; font-weight:700; padding:0 6px;
  }
  .slot.filled{
    border-style:solid; border-color:var(--mint-dark); background:var(--white);
    color:var(--ink); cursor:pointer; box-shadow:0 3px 0 #CDEFE2;
  }
  .slot.filled:hover{transform:translateY(-2px);}

  .bank{
    display:flex; flex-wrap:wrap; gap:10px; justify-content:center;
    padding:16px; background:#FFF9F0; border-radius:18px; border:2px solid #FBEFDC;
    min-height:60px; margin-bottom:22px;
  }
  .chip{
    font-family:'Noto Sans TC',sans-serif; font-weight:700; font-size:15px;
    padding:10px 16px; border-radius:14px; cursor:pointer;
    background:var(--white); color:var(--ink); border:2.5px solid #FFE1A8;
    box-shadow:0 4px 0 #F0CC85; transition:.12s;
    user-select:none;
  }
  .chip:hover{transform:translateY(-2px);}
  .chip:active{transform:translateY(2px); box-shadow:0 1px 0 #F0CC85;}
  .chip.hidden{display:none;}

  .actions-row{display:flex; gap:12px; justify-content:center;}
  .actions-row .btn{min-width:150px;}

  .feedback{
    text-align:center; font-family:'Baloo 2',sans-serif; font-weight:800; font-size:19px;
    margin:16px 0 4px; min-height:28px; transition:.2s;
  }
  .feedback.correct{color:var(--mint-dark);}
  .feedback.wrong{color:var(--coral-dark);}

  @keyframes shake{
    10%,90%{transform:translateX(-3px);} 20%,80%{transform:translateX(5px);}
    30%,50%,70%{transform:translateX(-8px);} 40%,60%{transform:translateX(8px);}
  }
  .shake{animation:shake .5s;}
  @keyframes pop{
    0%{transform:scale(1);} 40%{transform:scale(1.06);} 100%{transform:scale(1);}
  }
  .pop{animation:pop .4s;}

  /* ---------- Result screen ---------- */
  .result-hero{text-align:center; margin-bottom:20px;}
  .result-hero .mascot{font-size:60px;}
  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:20px 0;}
  .stat-card{
    border-radius:18px; padding:18px; text-align:center;
    border:2.5px solid #EFE3D3; background:#FFFCF6;
  }
  .stat-card .num{font-family:'Baloo 2',sans-serif; font-weight:800; font-size:30px; color:var(--sun-dark);}
  .stat-card .lab{font-size:13px; color:var(--ink-soft); font-weight:700; margin-top:2px;}

  table.review{width:100%; border-collapse:collapse; margin-top:8px; font-size:13.5px;}
  table.review th, table.review td{
    padding:10px 8px; text-align:left; border-bottom:2px solid #F3E9D6;
  }
  table.review th{color:var(--ink-soft); font-weight:800; font-size:12.5px;}
  table.review td.zh{color:var(--ink-soft); font-size:12.5px;}
  .tag{
    display:inline-block; padding:3px 10px; border-radius:999px; font-weight:800; font-size:12px;
  }
  .tag.ok{background:#DFF6EC; color:var(--mint-dark);}
  .tag.retry{background:#FFE7E2; color:var(--coral-dark);}

  .screen{display:none;}
  .screen.active{display:block;}
  .footer-note{text-align:center; color:var(--ink-soft); font-size:12px; margin-top:14px;}
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="brand"><div class="brand-badge">📝</div>句子重組大冒險</div>
  </div>

  <!-- ============ LOGIN SCREEN ============ -->
  <div id="screen-login" class="screen active">
    <div class="card">
      <div class="login-hero">
        <span class="mascot">🦉</span>
        <h2>歡迎來到句子重組樂園！</h2>
        <p>把打亂的句子排排好，一起學會「主詞＋動詞＋受詞＋地點＋時間」的順序吧！</p>
      </div>
      <div class="row2">
        <div class="field">
          <label>班級</label>
          <input id="input-class" type="text" placeholder="例如：701">
        </div>
        <div class="field">
          <label>座號</label>
          <input id="input-seat" type="text" placeholder="例如：12" inputmode="numeric">
        </div>
      </div>
      <div class="field">
        <label>姓名</label>
        <input id="input-name" type="text" placeholder="例如：王小明">
      </div>
      <div class="error-msg" id="login-error">請完整輸入班級、座號和姓名喔！</div>
      <button class="btn btn-primary" onclick="startGame()">🚀 開始挑戰</button>
    </div>
  </div>

  <!-- ============ GAME SCREEN ============ -->
  <div id="screen-game" class="screen">
    <div class="card">
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="progress-label" id="progress-label">1 / 10</div>
      </div>

      <div class="hint-box">
        <div class="hint-label">中文提示 HINT</div>
        <div class="hint-text" id="hint-text"></div>
      </div>

      <div class="slots" id="slots"></div>
      <div class="bank" id="bank"></div>

      <div class="feedback" id="feedback"></div>

      <div class="actions-row">
        <button class="btn btn-outline" onclick="clearAnswer()">↩️ 清空重排</button>
        <button class="btn btn-secondary" id="check-btn" onclick="checkAnswer()">✅ 確認答案</button>
      </div>
    </div>
    <div class="footer-note" id="player-tag"></div>
  </div>

  <!-- ============ RESULT SCREEN ============ -->
  <div id="screen-result" class="screen">
    <div class="card">
      <div class="result-hero">
        <span class="mascot" id="result-mascot">🏆</span>
        <h2 id="result-title">挑戰完成！</h2>
        <p id="result-sub" style="color:var(--ink-soft); font-size:14px;"></p>
      </div>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="num" id="stat-accuracy">--%</div>
          <div class="lab">答對率（首次答對）</div>
        </div>
        <div class="stat-card">
          <div class="num" id="stat-time">--:--</div>
          <div class="lab">總花費時間</div>
        </div>
      </div>
      <h3 style="font-size:16px; margin:18px 0 8px;">📋 答題一覽表</h3>
      <table class="review">
        <thead>
          <tr><th>#</th><th>正確句子</th><th>嘗試次數</th><th>花費時間</th><th>結果</th></tr>
        </thead>
        <tbody id="review-body"></tbody>
      </table>
      <div style="text-align:center; margin-top:26px;">
        <button class="btn btn-coral" onclick="playAgain()">🔁 再玩一次</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ---------------- 資料：句子（分成 主詞/動詞/受詞/地點/時間 區塊）---------------- */
const SENTENCES = [
  { chunks:["My mother","cooks","dinner","in the kitchen","at six."], zh:"我媽媽在廚房六點煮晚餐。" },
  { chunks:["Amy","practices","English","in her room","every morning."], zh:"Amy每天早上在她的房間練習英文。" },
  { chunks:["The students","clean","the classroom","after lunch."], zh:"學生們在午餐後打掃教室。" },
  { chunks:["Kevin","meets","his friends","at the park","on Sunday."], zh:"Kevin星期天在公園跟他的朋友見面。" },
  { chunks:["Lisa","buys","some fruit","at the market","every weekend."], zh:"Lisa每個週末在市場買一些水果。" },
  { chunks:["My brother","plays","video games","in his bedroom","after dinner."], zh:"我弟弟晚餐後在他的房間打電動。" },
  { chunks:["Cody","listens to","the music","every day."], zh:"Cody每天聽音樂。" },
  { chunks:["I","make","a cake","in the kitchen","every night."], zh:"我每天晚上在廚房做蛋糕。" },
  { chunks:["We","do","our homework","in the library","every day."], zh:"我們每天在圖書館做作業。" },
  { chunks:["Jamie","tells","a story","in the classroom","every Monday."], zh:"Jamie每個星期一在教室說故事。" }
];

/* ---------------- 遊戲狀態 ---------------- */
let student = {cls:"", seat:"", name:""};
let order = [];          // 本次遊戲題目順序（打亂）
let qIndex = 0;
let currentAnswer = [];  // 玩家目前排的 index 陣列（對應 bank chunk）
let bankState = [];      // 目前題目的 chunks（已打亂），每個 {text, used:bool}
let attemptsThisQ = 0;
let qStartTime = 0;
let gameStartTime = 0;
let results = [];        // 每題結果 {sentence, zh, attempts, timeSec, firstTry}

function shuffleArr(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ---------------- 登入 ---------------- */
function startGame(){
  const cls = document.getElementById('input-class').value.trim();
  const seat = document.getElementById('input-seat').value.trim();
  const name = document.getElementById('input-name').value.trim();
  const err = document.getElementById('login-error');
  if(!cls || !seat || !name){
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';
  student = {cls, seat, name};
  document.getElementById('player-tag').textContent = `👤 ${cls} 班 ${seat} 號 ${name}　正在挑戰中...`;

  order = shuffleArr(SENTENCES.map((s,i)=>i));
  qIndex = 0;
  results = [];
  gameStartTime = Date.now();
  showScreen('screen-game');
  loadQuestion();
}

/* ---------------- 出題 ---------------- */
function loadQuestion(){
  attemptsThisQ = 0;
  qStartTime = Date.now();
  const sIdx = order[qIndex];
  const s = SENTENCES[sIdx];

  document.getElementById('hint-text').textContent = s.zh;
  document.getElementById('progress-label').textContent = `${qIndex+1} / ${order.length}`;
  document.getElementById('progress-fill').style.width = `${(qIndex/order.length)*100}%`;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';

  // 打亂 chunk，確保不會剛好等於正確順序
  let shuffled;
  do{
    shuffled = shuffleArr(s.chunks.map((c,i)=>({text:c, origIndex:i})));
  }while(s.chunks.length>1 && shuffled.every((c,i)=>c.origIndex===i));

  bankState = shuffled.map(c=>({text:c.text, used:false}));
  currentAnswer = [];

  renderSlots(s.chunks.length);
  renderBank();
}

function renderSlots(count){
  const wrap = document.getElementById('slots');
  wrap.innerHTML = '';
  for(let i=0;i<count;i++){
    const div = document.createElement('div');
    div.className = 'slot';
    div.id = 'slot-'+i;
    div.textContent = '';
    if(currentAnswer[i]!==undefined){
      div.classList.add('filled');
      div.textContent = bankState[currentAnswer[i]].text;
      div.onclick = ()=>removeFromSlot(i);
    }
    wrap.appendChild(div);
  }
}

function renderBank(){
  const wrap = document.getElementById('bank');
  wrap.innerHTML = '';
  bankState.forEach((chip, idx)=>{
    const div = document.createElement('div');
    div.className = 'chip' + (chip.used ? ' hidden' : '');
    div.textContent = chip.text;
    div.onclick = ()=>addToSlot(idx);
    wrap.appendChild(div);
  });
}

function addToSlot(chipIdx){
  const sIdx = order[qIndex];
  const total = SENTENCES[sIdx].chunks.length;
  if(currentAnswer.length >= total) return;
  if(bankState[chipIdx].used) return;
  bankState[chipIdx].used = true;
  currentAnswer.push(chipIdx);
  renderSlots(total);
  renderBank();
}

function removeFromSlot(slotPos){
  const chipIdx = currentAnswer[slotPos];
  bankState[chipIdx].used = false;
  currentAnswer.splice(slotPos,1);
  const sIdx = order[qIndex];
  renderSlots(SENTENCES[sIdx].chunks.length);
  renderBank();
}

function clearAnswer(){
  currentAnswer.forEach(idx=> bankState[idx].used = false);
  currentAnswer = [];
  const sIdx = order[qIndex];
  renderSlots(SENTENCES[sIdx].chunks.length);
  renderBank();
}

/* ---------------- 檢查答案 ---------------- */
function checkAnswer(){
  const sIdx = order[qIndex];
  const s = SENTENCES[sIdx];
  if(currentAnswer.length < s.chunks.length){
    flashFeedback('請把所有字卡都放進格子裡喔！', 'wrong');
    return;
  }
  attemptsThisQ++;
  const answerText = currentAnswer.map(i=>bankState[i].text);
  const isCorrect = answerText.every((t,i)=>t===s.chunks[i]);

  if(isCorrect){
    flashFeedback('🌟 你正在通往成功的路上 🌟', 'correct', true);
    const timeSec = Math.round((Date.now()-qStartTime)/1000);
    results.push({
      sentence: s.chunks.join(' '),
      zh: s.zh,
      attempts: attemptsThisQ,
      timeSec,
      firstTry: attemptsThisQ===1
    });
    document.getElementById('check-btn').disabled = true;
    setTimeout(()=>{
      document.getElementById('check-btn').disabled = false;
      qIndex++;
      if(qIndex >= order.length){
        finishGame();
      }else{
        loadQuestion();
      }
    }, 1100);
  }else{
    flashFeedback('💪 沒關係，我們再挑戰一次', 'wrong');
    const card = document.querySelector('#screen-game .card');
    card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
  }
}

function flashFeedback(text, type, pop){
  const fb = document.getElementById('feedback');
  fb.textContent = text;
  fb.className = 'feedback ' + type + (pop ? ' pop' : '');
}

/* ---------------- 結算 ---------------- */
function finishGame(){
  const totalTimeSec = Math.round((Date.now()-gameStartTime)/1000);
  const firstTryCount = results.filter(r=>r.firstTry).length;
  const accuracy = Math.round((firstTryCount / results.length) * 100);

  document.getElementById('stat-accuracy').textContent = accuracy + '%';
  document.getElementById('stat-time').textContent = formatTime(totalTimeSec);
  document.getElementById('result-sub').textContent =
    `${student.cls} 班 ${student.seat} 號 ${student.name}，共完成 ${results.length} 題`;
  document.getElementById('result-mascot').textContent = accuracy>=80 ? '🏆' : (accuracy>=50 ? '🎉' : '🌱');
  document.getElementById('result-title').textContent = accuracy>=80 ? '太棒了，你是句子小達人！' : '挑戰完成，繼續加油！';

  const tbody = document.getElementById('review-body');
  tbody.innerHTML = '';
  results.forEach((r,i)=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${i+1}</td>
      <td>${r.sentence}<div class="zh">${r.zh}</div></td>
      <td>${r.attempts} 次</td>
      <td>${r.timeSec} 秒</td>
      <td><span class="tag ${r.firstTry?'ok':'retry'}">${r.firstTry?'首次答對':'多次嘗試'}</span></td>
    `;
    tbody.appendChild(tr);
  });

  showScreen('screen-result');
}

function formatTime(sec){
  const m = Math.floor(sec/60), s = sec%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function playAgain(){
  document.getElementById('progress-fill').style.width = '0%';
  showScreen('screen-login');
}

</script>
</body>
</html>

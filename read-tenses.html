<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時態探險隊：現在式 vs 過去式</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF8EC;
    --plum:#4A3F55;
    --plum-soft:#7A6E88;
    --sky:#5CB8F2;
    --sky-dark:#2E8FD6;
    --coral:#FF8FA3;
    --coral-dark:#E85D77;
    --yellow:#FFD966;
    --yellow-dark:#E8B93E;
    --mint:#7ED9A4;
    --mint-dark:#4CB97C;
    --red:#FF8177;
    --red-dark:#E05A50;
    --card:#FFFFFF;
    --shadow: 0 8px 0 rgba(74,63,85,0.15);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Noto Sans TC','Baloo 2',sans-serif;
    background:
      radial-gradient(circle at 10% 15%, #FFEAB6 0%, transparent 35%),
      radial-gradient(circle at 90% 10%, #BEE8FF 0%, transparent 35%),
      radial-gradient(circle at 85% 90%, #FFD3DE 0%, transparent 35%),
      radial-gradient(circle at 15% 90%, #C9F5DC 0%, transparent 35%),
      var(--cream);
    min-height:100vh;
    color:var(--plum);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 12px;
  }
  .stage{
    width:100%;
    max-width:640px;
  }
  .screen{display:none;}
  .screen.active{display:block; animation: pop-in .35s ease;}
  @keyframes pop-in{
    from{opacity:0; transform:translateY(14px) scale(.97);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }
  .panel{
    background:var(--card);
    border-radius:28px;
    padding:32px 28px;
    box-shadow: var(--shadow), 0 2px 12px rgba(74,63,85,0.08);
    border:3px solid #F1E6D3;
    position:relative;
  }
  h1.title{
    font-family:'Baloo 2',sans-serif;
    font-weight:800;
    font-size:28px;
    text-align:center;
    color:var(--plum);
    margin:0 0 4px;
  }
  .subtitle{
    text-align:center;
    color:var(--plum-soft);
    font-size:14px;
    margin:0 0 24px;
    font-weight:500;
  }
  .rocket-row{
    display:flex;
    justify-content:center;
    gap:10px;
    font-size:34px;
    margin-bottom:6px;
    user-select:none;
  }
  label.field-label{
    display:block;
    font-size:14px;
    font-weight:700;
    color:var(--plum);
    margin:16px 0 6px;
  }
  input.text-input{
    width:100%;
    padding:12px 16px;
    border-radius:16px;
    border:2.5px solid #EADFC8;
    background:#FFFDF7;
    font-size:16px;
    font-family:'Noto Sans TC',sans-serif;
    color:var(--plum);
    outline:none;
    transition:border-color .15s;
  }
  input.text-input:focus{border-color:var(--sky);}
  .start-btn{
    margin-top:26px;
    width:100%;
    padding:16px;
    border-radius:20px;
    border:none;
    background:linear-gradient(180deg, var(--mint) 0%, var(--mint-dark) 100%);
    color:#0E4A2E;
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size:19px;
    cursor:pointer;
    box-shadow:0 5px 0 #2E7D53;
    transition:transform .08s, box-shadow .08s;
  }
  .start-btn:active{transform:translateY(4px); box-shadow:0 1px 0 #2E7D53;}
  .start-btn:disabled{opacity:.5; cursor:not-allowed;}
  .error-msg{
    color:var(--red-dark);
    font-size:13px;
    font-weight:700;
    text-align:center;
    margin-top:10px;
    min-height:16px;
  }

  /* game screen */
  .hud{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
    font-size:13px;
    font-weight:700;
    color:var(--plum-soft);
    flex-wrap:wrap;
    gap:8px;
  }
  .hud .student-name{color:var(--plum); font-weight:800;}
  .hud .timer{
    background:var(--yellow);
    color:#5C4200;
    padding:4px 12px;
    border-radius:12px;
    font-family:'Baloo 2',sans-serif;
  }
  .progress-track{
    height:14px;
    background:#F1E6D3;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:6px;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--sky), var(--mint));
    border-radius:10px;
    transition:width .35s ease;
    width:0%;
  }
  .progress-label{
    text-align:right;
    font-size:12px;
    color:var(--plum-soft);
    font-weight:700;
    margin-bottom:18px;
  }
  .sentence-card{
    background:linear-gradient(180deg,#FFFDF7 0%, #FFF6E4 100%);
    border:2.5px dashed #EFD9A6;
    border-radius:22px;
    padding:32px 20px;
    text-align:center;
    margin-bottom:24px;
    min-height:110px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .sentence-text{
    font-family:'Baloo 2',sans-serif;
    font-size:22px;
    font-weight:600;
    color:var(--plum);
    line-height:1.5;
  }
  .choice-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  .choice-btn{
    padding:20px 10px;
    border-radius:20px;
    border:none;
    cursor:pointer;
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size:18px;
    color:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    transition:transform .08s, box-shadow .08s, opacity .2s;
  }
  .choice-btn .emoji{font-size:30px;}
  .choice-btn.present{
    background:linear-gradient(180deg, var(--sky) 0%, var(--sky-dark) 100%);
    box-shadow:0 5px 0 #1E6FA8;
  }
  .choice-btn.past{
    background:linear-gradient(180deg, var(--coral) 0%, var(--coral-dark) 100%);
    box-shadow:0 5px 0 #B8425A;
  }
  .choice-btn:active:not(:disabled){transform:translateY(4px);}
  .choice-btn.present:active:not(:disabled){box-shadow:0 1px 0 #1E6FA8;}
  .choice-btn.past:active:not(:disabled){box-shadow:0 1px 0 #B8425A;}
  .choice-btn:disabled{opacity:.55; cursor:not-allowed;}

  .feedback{
    margin-top:20px;
    text-align:center;
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size:18px;
    min-height:30px;
    border-radius:16px;
    padding:10px;
    transition:background .15s;
  }
  .feedback.correct{background:#E4F8EC; color:#1F7A45;}
  .feedback.wrong{background:#FFE9E6; color:#C43A2F;}
  .shake{animation:shake .4s;}
  @keyframes shake{
    10%,90%{transform:translateX(-3px);}
    20%,80%{transform:translateX(5px);}
    30%,50%,70%{transform:translateX(-8px);}
    40%,60%{transform:translateX(8px);}
  }

  /* end screen */
  .result-hero{
    text-align:center;
    margin-bottom:20px;
  }
  .result-hero .big-emoji{font-size:52px; display:block; margin-bottom:6px;}
  .stats-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:22px;
  }
  .stat-card{
    background:#FFF6E4;
    border-radius:18px;
    padding:16px;
    text-align:center;
    border:2px solid #F1E0B8;
  }
  .stat-card .stat-label{font-size:12px; color:var(--plum-soft); font-weight:700; margin-bottom:4px;}
  .stat-card .stat-value{font-family:'Baloo 2',sans-serif; font-size:26px; font-weight:800; color:var(--plum);}
  table.review-table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
    margin-bottom:8px;
  }
  table.review-table th{
    text-align:left;
    padding:8px 6px;
    color:var(--plum-soft);
    font-size:12px;
    border-bottom:2px solid #F1E6D3;
  }
  table.review-table td{
    padding:8px 6px;
    border-bottom:1px solid #F5EEDF;
    vertical-align:top;
  }
  .tag{
    display:inline-block;
    padding:2px 9px;
    border-radius:10px;
    font-size:11px;
    font-weight:700;
    white-space:nowrap;
  }
  .tag.present{background:#DCF0FF; color:#0F5C93;}
  .tag.past{background:#FFE1E8; color:#A32E48;}
  .mark{font-size:16px;}
  .mark.ok{color:#2E9E5B;}
  .mark.no{color:#D8493A;}
  .replay-btn{
    width:100%;
    margin-top:10px;
    padding:16px;
    border-radius:20px;
    border:none;
    background:linear-gradient(180deg, var(--yellow) 0%, var(--yellow-dark) 100%);
    color:#5C4200;
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 5px 0 #B8892A;
  }
  .replay-btn:active{transform:translateY(4px); box-shadow:0 1px 0 #B8892A;}

  @media (max-width:420px){
    .panel{padding:24px 16px;}
    .sentence-text{font-size:18px;}
    .choice-btn{font-size:15px; padding:16px 6px;}
  }
</style>
</head>
<body>
<div class="stage">

  <!-- 開始畫面 -->
  <div class="screen active" id="screen-start">
    <div class="panel">
      <div class="rocket-row">🚀🕰️⏳</div>
      <h1 class="title">時態探險隊</h1>
      <p class="subtitle">現在式 vs 過去式・辨識大挑戰</p>

      <label class="field-label" for="input-class">班級</label>
      <input class="text-input" id="input-class" type="text" placeholder="例如：701">

      <label class="field-label" for="input-number">座號</label>
      <input class="text-input" id="input-number" type="text" placeholder="例如：12" inputmode="numeric">

      <label class="field-label" for="input-name">姓名</label>
      <input class="text-input" id="input-name" type="text" placeholder="例如：王小明">

      <button class="start-btn" id="btn-start">出發探險去！ 🚀</button>
      <div class="error-msg" id="start-error"></div>
    </div>
  </div>

  <!-- 遊戲畫面 -->
  <div class="screen" id="screen-game">
    <div class="panel">
      <div class="hud">
        <span class="student-name" id="hud-name">—</span>
        <span class="timer" id="hud-timer">⏱ 00:00</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">第 1 / 10 題</div>

      <div class="sentence-card">
        <div class="sentence-text" id="sentence-text">Loading...</div>
      </div>

      <div class="choice-row">
        <button class="choice-btn present" id="btn-present">
          <span class="emoji">☀️</span>
          <span>現在式</span>
        </button>
        <button class="choice-btn past" id="btn-past">
          <span class="emoji">⏳</span>
          <span>過去式</span>
        </button>
      </div>

      <div class="feedback" id="feedback"></div>
    </div>
  </div>

  <!-- 結束畫面 -->
  <div class="screen" id="screen-end">
    <div class="panel">
      <div class="result-hero">
        <span class="big-emoji" id="end-emoji">🏆</span>
        <h1 class="title" id="end-title">探險完成！</h1>
        <p class="subtitle" id="end-name-line">—</p>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">答對率（一次答對）</div>
          <div class="stat-value" id="stat-accuracy">0%</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">花費時間</div>
          <div class="stat-value" id="stat-time">00:00</div>
        </div>
      </div>

      <table class="review-table">
        <thead>
          <tr><th style="width:8%">#</th><th>句子</th><th style="width:22%">正確時態</th><th style="width:14%">結果</th></tr>
        </thead>
        <tbody id="review-body"></tbody>
      </table>

      <button class="replay-btn" id="btn-replay">再玩一次 🔄</button>
    </div>
  </div>

</div>

<script>
(function(){
  var SENTENCES = [
    {text:"I was a student before.", tense:"past"},
    {text:"She was late for school yesterday.", tense:"past"},
    {text:"I went to the zoo an hour ago.", tense:"past"},
    {text:"Mr. Lin bought a house last year.", tense:"past"},
    {text:"Zac moved to Taipei last month.", tense:"past"},
    {text:"Cody visited his aunt the day before yesterday.", tense:"past"},
    {text:"They studied English in the library yesterday afternoon.", tense:"past"},
    {text:"Mom made a cake for me last night.", tense:"past"},
    {text:"We had a big dinner last night.", tense:"past"},
    {text:"What are you doing now?", tense:"present"},
    {text:"Listen! Someone is singing.", tense:"present"},
    {text:"I am a teacher.", tense:"present"},
    {text:"He has five houses.", tense:"present"},
    {text:"They go shopping in BigCity every weekend.", tense:"present"},
    {text:"Zac practices soccer after school.", tense:"present"},
    {text:"Lea buys some fruit every Friday.", tense:"present"}
  ];
  var QUESTIONS_PER_ROUND = 10;

  var state = {
    student:{cls:"", number:"", name:""},
    questions:[],
    currentIndex:0,
    results:[],
    startTime:0,
    timerHandle:null,
    locked:false
  };

  function $(id){ return document.getElementById(id); }
  function showScreen(id){
    document.querySelectorAll(".screen").forEach(function(s){ s.classList.remove("active"); });
    $(id).classList.add("active");
  }

  function shuffle(arr){
    var a = arr.slice();
    for(var i=a.length-1;i>0;i--){
      var j = Math.floor(Math.random()*(i+1));
      var tmp=a[i]; a[i]=a[j]; a[j]=tmp;
    }
    return a;
  }

  function pad2(n){ return n<10 ? "0"+n : ""+n; }
  function fmtTime(ms){
    var totalSec = Math.floor(ms/1000);
    var m = Math.floor(totalSec/60);
    var s = totalSec%60;
    return pad2(m)+":"+pad2(s);
  }

  // ---------- 開始畫面 ----------
  $("btn-start").addEventListener("click", function(){
    var cls = $("input-class").value.trim();
    var number = $("input-number").value.trim();
    var name = $("input-name").value.trim();
    if(!cls || !number || !name){
      $("start-error").textContent = "請完整輸入班級、座號、姓名喔！";
      return;
    }
    $("start-error").textContent = "";
    state.student = {cls:cls, number:number, name:name};
    startGame();
  });

  function startGame(){
    state.questions = shuffle(SENTENCES).slice(0, QUESTIONS_PER_ROUND);
    state.currentIndex = 0;
    state.results = [];
    state.startTime = Date.now();
    state.locked = false;

    $("hud-name").textContent = state.student.cls + "班 " + state.student.number + "號 " + state.student.name;
    showScreen("screen-game");
    startTimer();
    renderQuestion();
  }

  function startTimer(){
    if(state.timerHandle) clearInterval(state.timerHandle);
    updateTimerDisplay();
    state.timerHandle = setInterval(updateTimerDisplay, 1000);
  }
  function updateTimerDisplay(){
    var elapsed = Date.now() - state.startTime;
    $("hud-timer").textContent = "⏱ " + fmtTime(elapsed);
  }

  function renderQuestion(){
    var q = state.questions[state.currentIndex];
    $("sentence-text").textContent = q.text;
    $("progress-label").textContent = "第 " + (state.currentIndex+1) + " / " + QUESTIONS_PER_ROUND + " 題";
    $("progress-fill").style.width = ((state.currentIndex)/QUESTIONS_PER_ROUND*100) + "%";
    $("feedback").textContent = "";
    $("feedback").className = "feedback";
    setButtonsEnabled(true);
    q._attempts = q._attempts || 0;
    q._firstAnswerRecorded = q._firstAnswerRecorded || false;
  }

  function setButtonsEnabled(enabled){
    $("btn-present").disabled = !enabled;
    $("btn-past").disabled = !enabled;
  }

  function handleAnswer(choice){
    if(state.locked) return;
    var q = state.questions[state.currentIndex];
    q._attempts++;
    var correct = (choice === q.tense);

    if(!q._firstAnswerRecorded){
      q._firstAnswerRecorded = true;
      state.results.push({
        text: q.text,
        tense: q.tense,
        firstCorrect: correct
      });
    }

    var fb = $("feedback");
    if(correct){
      fb.textContent = "Very good! 🎉";
      fb.className = "feedback correct";
      state.locked = true;
      setButtonsEnabled(false);
      setTimeout(nextQuestion, 850);
    } else {
      fb.textContent = "⚠️ 注意動詞變化與時間";
      fb.className = "feedback wrong shake";
      setTimeout(function(){ fb.classList.remove("shake"); }, 400);
    }
  }

  $("btn-present").addEventListener("click", function(){ handleAnswer("present"); });
  $("btn-past").addEventListener("click", function(){ handleAnswer("past"); });

  function nextQuestion(){
    state.locked = false;
    state.currentIndex++;
    if(state.currentIndex >= QUESTIONS_PER_ROUND){
      finishGame();
    } else {
      renderQuestion();
    }
  }

  function finishGame(){
    $("progress-fill").style.width = "100%";
    clearInterval(state.timerHandle);
    var totalMs = Date.now() - state.startTime;
    var correctCount = state.results.filter(function(r){ return r.firstCorrect; }).length;
    var accuracy = Math.round(correctCount / QUESTIONS_PER_ROUND * 100);

    $("end-name-line").textContent = state.student.cls + "班 " + state.student.number + "號 " + state.student.name + " 的探險報告";
    $("stat-accuracy").textContent = accuracy + "%";
    $("stat-time").textContent = fmtTime(totalMs);
    $("end-emoji").textContent = accuracy >= 80 ? "🏆" : (accuracy >= 50 ? "🎈" : "🌱");
    $("end-title").textContent = accuracy >= 80 ? "太厲害了！" : (accuracy >= 50 ? "探險完成！" : "再接再厲！");

    var tbody = $("review-body");
    tbody.innerHTML = "";
    state.results.forEach(function(r, idx){
      var tr = document.createElement("tr");
      var tenseLabel = r.tense === "present" ? "現在式" : "過去式";
      var tenseClass = r.tense === "present" ? "present" : "past";
      var markHtml = r.firstCorrect
        ? '<span class="mark ok">✔ 答對</span>'
        : '<span class="mark no">✘ 答錯</span>';
      tr.innerHTML =
        "<td>" + (idx+1) + "</td>" +
        "<td>" + r.text + "</td>" +
        "<td><span class='tag " + tenseClass + "'>" + tenseLabel + "</span></td>" +
        "<td>" + markHtml + "</td>";
      tbody.appendChild(tr);
    });

    showScreen("screen-end");
  }

  $("btn-replay").addEventListener("click", function(){
    startGame();
  });

})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>單字大冒險 🦊 七上英語單字遊戲</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF7EC;
    --pink:#FF8FAB;
    --pink-deep:#FF6B95;
    --blue:#4D96FF;
    --mint:#5FCBA0;
    --yellow:#FFD166;
    --plum:#4A3F55;
    --plum-soft:#7A6E8C;
    --white:#FFFFFF;
    --radius-lg:28px;
    --radius-md:18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    font-family:'Nunito',sans-serif;
    color:var(--plum);
    background:
      radial-gradient(circle at 12% 18%, rgba(255,209,102,0.35) 0, transparent 40%),
      radial-gradient(circle at 88% 12%, rgba(77,150,255,0.25) 0, transparent 42%),
      radial-gradient(circle at 85% 85%, rgba(255,143,171,0.3) 0, transparent 45%),
      radial-gradient(circle at 10% 88%, rgba(95,203,160,0.3) 0, transparent 42%),
      var(--cream);
    overflow-x:hidden;
    position:relative;
  }
  /* floating decorative shapes */
  .floaty{
    position:fixed;
    pointer-events:none;
    opacity:0.55;
    filter:drop-shadow(0 6px 10px rgba(0,0,0,0.06));
    animation:drift 9s ease-in-out infinite;
    z-index:0;
  }
  @keyframes drift{
    0%,100%{transform:translateY(0) rotate(0deg);}
    50%{transform:translateY(-18px) rotate(8deg);}
  }
  .app{
    position:relative;
    z-index:1;
    max-width:640px;
    margin:0 auto;
    padding:28px 18px 60px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .screen{display:none;width:100%;}
  .screen.active{display:block;}

  .brand{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom:18px;
  }
  .brand h1{
    font-family:'Fredoka',sans-serif;
    font-weight:700;
    font-size:clamp(26px,6vw,34px);
    color:var(--pink-deep);
    text-shadow:2px 2px 0 rgba(255,255,255,0.7);
    margin:0;
    letter-spacing:0.5px;
  }

  .card{
    background:var(--white);
    border-radius:var(--radius-lg);
    padding:30px 26px;
    box-shadow:0 14px 0 rgba(255,143,171,0.18), 0 18px 40px rgba(74,63,85,0.10);
    border:3px solid #FFE3EC;
    width:100%;
  }

  /* MASCOT */
  .mascot-wrap{display:flex;justify-content:center;margin-bottom:8px;}
  .mascot{width:118px;height:118px;transition:transform .25s ease;}
  .mascot.idle{animation:bob 2.6s ease-in-out infinite;}
  .mascot.happy{animation:hop .5s ease 2;}
  .mascot.sad{animation:wobble .5s ease;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-10px) rotate(2deg);}}
  @keyframes hop{0%{transform:translateY(0) scale(1);}30%{transform:translateY(-22px) scale(1.06);}60%{transform:translateY(0) scale(1);}100%{transform:translateY(-6px) scale(1.02);}}
  @keyframes wobble{0%,100%{transform:rotate(0);}25%{transform:rotate(-10deg);}75%{transform:rotate(10deg);}}

  /* START SCREEN */
  .subtitle{
    text-align:center;
    color:var(--plum-soft);
    font-weight:700;
    margin:0 0 22px;
    font-size:15px;
  }
  .field{margin-bottom:16px;}
  .field label{
    display:block;
    font-weight:800;
    font-size:14px;
    color:var(--pink-deep);
    margin-bottom:6px;
  }
  .field input{
    width:100%;
    padding:13px 16px;
    border-radius:var(--radius-md);
    border:2.5px solid #FFD6E4;
    font-family:'Nunito',sans-serif;
    font-size:16px;
    font-weight:700;
    color:var(--plum);
    background:#FFFBF6;
    outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  .field input:focus{
    border-color:var(--pink);
    box-shadow:0 0 0 4px rgba(255,143,171,0.18);
  }
  .row2{display:flex;gap:12px;}
  .row2 .field{flex:1;}

  .btn{
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:18px;
    border:none;
    border-radius:999px;
    padding:15px 20px;
    cursor:pointer;
    color:var(--white);
    background:linear-gradient(180deg, var(--pink) 0%, var(--pink-deep) 100%);
    box-shadow:0 6px 0 #E85285;
    width:100%;
    transition:transform .08s ease, box-shadow .08s ease;
    letter-spacing:0.5px;
  }
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 #E85285;}
  .btn:disabled{opacity:0.45;cursor:not-allowed;}
  .btn-secondary{
    background:linear-gradient(180deg, var(--blue) 0%, #2F79E8 100%);
    box-shadow:0 6px 0 #2560B8;
  }
  .btn-secondary:active{box-shadow:0 2px 0 #2560B8;}

  .hint-error{
    color:#E8527C;
    font-weight:800;
    font-size:13px;
    text-align:center;
    margin:-6px 0 14px;
    min-height:16px;
  }

  /* QUIZ SCREEN */
  .quiz-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    color:var(--plum-soft);
    font-size:14px;
  }
  .pill{
    background:#FFF1F5;
    border:2px solid #FFD6E4;
    border-radius:999px;
    padding:5px 14px;
    color:var(--pink-deep);
  }
  .pill.timer{background:#EAF3FF;border-color:#CFE2FF;color:var(--blue);}

  .progress-track{
    width:100%;
    height:14px;
    background:#FFEEF3;
    border-radius:999px;
    overflow:hidden;
    margin-bottom:22px;
    border:2px solid #FFD6E4;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--yellow), var(--pink));
    border-radius:999px;
    transition:width .35s ease;
  }

  .word-card{
    text-align:center;
    background:linear-gradient(180deg,#FFFDF9,#FFF7EC);
    border:2.5px dashed #FFD166;
    border-radius:var(--radius-md);
    padding:26px 16px;
    margin-bottom:22px;
  }
  .word-eyebrow{
    font-weight:800;
    font-size:12px;
    letter-spacing:2px;
    color:var(--mint);
    text-transform:uppercase;
    margin-bottom:8px;
  }
  .word-en{
    font-family:'Fredoka',sans-serif;
    font-weight:700;
    font-size:clamp(28px,7vw,38px);
    color:var(--plum);
    word-break:break-word;
  }

  .options{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:8px;
  }
  .opt{
    font-family:'Nunito',sans-serif;
    font-weight:800;
    font-size:16px;
    background:var(--white);
    border:2.5px solid #EFE6F5;
    border-radius:var(--radius-md);
    padding:16px 10px;
    cursor:pointer;
    color:var(--plum);
    box-shadow:0 4px 0 #EFE0EA;
    transition:transform .08s ease, box-shadow .08s ease, background .15s, border-color .15s;
    min-height:64px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    line-height:1.3;
  }
  .opt:hover:not(:disabled){border-color:var(--pink);transform:translateY(-2px);}
  .opt:active:not(:disabled){transform:translateY(2px);box-shadow:0 1px 0 #EFE0EA;}
  .opt:disabled{cursor:default;}
  .opt.correct{background:#E6F8EF;border-color:var(--mint);color:#1E8A5F;box-shadow:0 4px 0 #B9E9D2;}
  .opt.wrong{background:#FFECEF;border-color:#FF8FA0;color:#D6395A;box-shadow:0 4px 0 #FFC9D3;}

  .feedback{
    min-height:34px;
    text-align:center;
    font-family:'Fredoka',sans-serif;
    font-weight:700;
    font-size:20px;
    margin-top:4px;
  }
  .feedback.good{color:#1E8A5F;}
  .feedback.bad{color:#D6395A;}

  /* RESULT SCREEN */
  .result-hero{
    text-align:center;
    margin-bottom:18px;
  }
  .result-hero h2{
    font-family:'Fredoka',sans-serif;
    font-size:26px;
    color:var(--pink-deep);
    margin:6px 0 2px;
  }
  .stats{
    display:flex;
    gap:12px;
    margin:18px 0 20px;
  }
  .stat{
    flex:1;
    background:#FFF7EC;
    border:2.5px solid #FFE3B8;
    border-radius:var(--radius-md);
    padding:16px 10px;
    text-align:center;
  }
  .stat .num{
    font-family:'Fredoka',sans-serif;
    font-weight:700;
    font-size:26px;
    color:var(--pink-deep);
  }
  .stat .lbl{
    font-size:12px;
    font-weight:800;
    color:var(--plum-soft);
    margin-top:2px;
  }

  .review-title{
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:16px;
    color:var(--plum);
    margin:6px 0 10px;
  }
  .review-table{
    width:100%;
    border-collapse:separate;
    border-spacing:0 8px;
    font-size:13.5px;
  }
  .review-table th{
    text-align:left;
    font-weight:800;
    color:var(--plum-soft);
    padding:0 8px;
    font-size:12px;
  }
  .review-table td{
    background:#FFFBF6;
    padding:10px 8px;
    font-weight:700;
  }
  .review-table tr td:first-child{border-radius:12px 0 0 12px;}
  .review-table tr td:last-child{border-radius:0 12px 12px 0;}
  .review-table tr.miss td{background:#FFF1F0;}
  .badge-ok{color:#1E8A5F;}
  .badge-miss{color:#D6395A;}

  .footer-btn{margin-top:22px;}

  @media (max-width:420px){
    .options{grid-template-columns:1fr;}
    .card{padding:22px 16px;}
  }
</style>
</head>

// Flatten + dedupe by English word (keep first occurrence) so quiz prompts stay unambiguous
const seen = new Set();
const ALL_WORDS = [];
Object.keys(VOCAB_RAW).forEach(unit=>{
  VOCAB_RAW[unit].forEach(([en,zh])=>{
    if(!seen.has(en)){
      seen.add(en);
      ALL_WORDS.push({en,zh,unit});
    }
  });
});

/* ================= STATE ================= */
const QUESTION_COUNT = 20;
let state = {
  student:{cls:"",seat:"",name:""},
  questions:[],
  currentIndex:0,
  records:[],      // {en, zh, attempts, gotFirstTry}
  startTime:0,
  timerHandle:null,
  currentAttempts:0,
  locked:false
};

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function buildQuestions(){
  const pool = shuffle(ALL_WORDS).slice(0,QUESTION_COUNT);
  return pool.map(word=>{
    const distractorsPool = ALL_WORDS.filter(w=>w.en!==word.en);
    const distractors = shuffle(distractorsPool).slice(0,3).map(w=>w.zh);
    const options = shuffle([word.zh,...distractors]);
    return {en:word.en, zh:word.zh, options};
  });
}

/* ================= SCREEN SWITCH ================= */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ================= START SCREEN ================= */
document.getElementById('btn-start').addEventListener('click', ()=>{
  const cls = document.getElementById('in-class').value.trim();
  const seat = document.getElementById('in-seat').value.trim();
  const name = document.getElementById('in-name').value.trim();
  const errEl = document.getElementById('start-error');
  if(!cls || !seat || !name){
    errEl.textContent = '請填寫班級、座號與姓名唷 🐾';
    return;
  }
  errEl.textContent = '';
  state.student = {cls,seat,name};
  startQuiz();
});

/* ================= QUIZ FLOW ================= */
function startQuiz(){
  state.questions = buildQuestions();
  state.currentIndex = 0;
  state.records = [];
  state.startTime = Date.now();
  showScreen('screen-quiz');
  startTimer();
  renderQuestion();
}

function startTimer(){
  clearInterval(state.timerHandle);
  updateTimerDisplay();
  state.timerHandle = setInterval(updateTimerDisplay, 500);
}
function updateTimerDisplay(){
  const secs = Math.floor((Date.now()-state.startTime)/1000);
  document.getElementById('q-timer').textContent = '⏱ ' + formatTime(secs);
}
function formatTime(totalSecs){
  const m = Math.floor(totalSecs/60).toString().padStart(2,'0');
  const s = (totalSecs%60).toString().padStart(2,'0');
  return `${m}:${s}`;
}

function renderQuestion(){
  state.currentAttempts = 0;
  state.locked = false;
  const q = state.questions[state.currentIndex];
  document.getElementById('q-progress').textContent = `第 ${state.currentIndex+1} / ${QUESTION_COUNT} 題`;
  document.getElementById('progress-fill').style.width = `${((state.currentIndex)/QUESTION_COUNT)*100}%`;
  document.getElementById('word-en').textContent = q.en;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';

  const wrap = document.getElementById('options-wrap');
  wrap.innerHTML = '';
  q.options.forEach(optZh=>{
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = optZh;
    btn.addEventListener('click', ()=>handleAnswer(optZh, btn));
    wrap.appendChild(btn);
  });

  const mascot = document.getElementById('mascot-quiz');
  mascot.className = 'mascot idle';
}

function handleAnswer(selectedZh, btnEl){
  if(state.locked) return;
  const q = state.questions[state.currentIndex];
  const isCorrect = selectedZh === q.zh;
  state.currentAttempts++;

  const feedback = document.getElementById('feedback');
  const mascot = document.getElementById('mascot-quiz');
  const allOpts = document.querySelectorAll('#options-wrap .opt');

  if(isCorrect){
    state.locked = true;
    allOpts.forEach(o=>o.disabled = true);
    btnEl.classList.add('correct');
    feedback.textContent = 'Good job! 🎉';
    feedback.className = 'feedback good';
    mascot.className = 'mascot happy';

    state.records.push({
      en: q.en,
      zh: q.zh,
      attempts: state.currentAttempts,
      gotFirstTry: state.currentAttempts === 1
    });

    setTimeout(()=>{
      state.currentIndex++;
      if(state.currentIndex >= QUESTION_COUNT){
        finishQuiz();
      } else {
        renderQuestion();
      }
    }, 700);
  } else {
    btnEl.classList.add('wrong');
    btnEl.disabled = true;
    feedback.textContent = 'Try again! 💪';
    feedback.className = 'feedback bad';
    mascot.className = 'mascot sad';
    setTimeout(()=>{ mascot.className = 'mascot idle'; }, 500);
  }
}

/* ================= RESULT SCREEN ================= */
function finishQuiz(){
  clearInterval(state.timerHandle);
  const totalSecs = Math.floor((Date.now()-state.startTime)/1000);
  const firstTryCount = state.records.filter(r=>r.gotFirstTry).length;
  const accuracy = Math.round((firstTryCount/QUESTION_COUNT)*100);

  document.getElementById('result-name').textContent =
    `${state.student.cls} 班 ${state.student.seat} 號 ${state.student.name}`;
  document.getElementById('result-title').textContent =
    accuracy >= 80 ? '太棒了！你是單字小達人！' :
    accuracy >= 50 ? '做得不錯，繼續加油！' : '再接再厲，你可以更棒！';

  document.getElementById('stat-accuracy').textContent = accuracy + '%';
  document.getElementById('stat-time').textContent = formatTime(totalSecs);
  document.getElementById('stat-correct').textContent = `${firstTryCount}/${QUESTION_COUNT}`;

  const tbl = document.getElementById('review-body');
  let rows = `<tr><th>#</th><th>英文單字</th><th>正確意思</th><th>結果</th><th>嘗試次數</th></tr>`;
  state.records.forEach((r,i)=>{
    rows += `<tr class="${r.gotFirstTry?'':'miss'}">
      <td>${i+1}</td>
      <td>${escapeHtml(r.en)}</td>
      <td>${escapeHtml(r.zh)}</td>
      <td class="${r.gotFirstTry?'badge-ok':'badge-miss'}">${r.gotFirstTry?'✅ 首答對':'🔁 重試後對'}</td>
      <td>${r.attempts}</td>
    </tr>`;
  });
  tbl.innerHTML = rows;

  showScreen('screen-result');
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

/* ================= REPLAY ================= */
document.getElementById('btn-replay').addEventListener('click', ()=>{
  startQuiz();
});
</script>

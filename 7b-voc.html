<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#17143b" />
  <title>三關單字挑戰</title>
  <style>
    :root {
      --bg: #0d1029;
      --panel: rgba(18, 20, 59, 0.92);
      --panel-2: rgba(37, 28, 76, 0.96);
      --ink: #fffaf0;
      --muted: #c9c4df;
      --gold: #ffc94d;
      --gold-2: #fff0a8;
      --purple: #6a4dd7;
      --purple-2: #9b77ff;
      --green: #80d857;
      --red: #ff7c72;
      --line: rgba(255,255,255,.14);
      --shadow: 0 18px 50px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif; color: var(--ink); }
    body {
      background:
        radial-gradient(circle at 15% 10%, rgba(73, 89, 190, .45), transparent 26%),
        radial-gradient(circle at 85% 16%, rgba(114, 50, 163, .35), transparent 28%),
        linear-gradient(160deg, #081124 0%, #16103b 52%, #0c132a 100%);
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed; inset: 0; pointer-events: none; opacity: .3;
      background-image:
        radial-gradient(circle at 20% 25%, #fff 0 1px, transparent 1.5px),
        radial-gradient(circle at 68% 18%, #fff 0 1px, transparent 1.5px),
        radial-gradient(circle at 84% 64%, #fff 0 1px, transparent 1.5px),
        radial-gradient(circle at 34% 78%, #fff 0 1px, transparent 1.5px);
      background-size: 180px 180px, 240px 240px, 210px 210px, 260px 260px;
    }
    button, input, select { font: inherit; }
    button { touch-action: manipulation; }
    .hidden { display: none !important; }
    .app { min-height: 100vh; display: grid; place-items: center; padding: 18px; }
    .shell { width: min(1180px, 100%); }
    .card {
      background: linear-gradient(180deg, rgba(26, 30, 78, .96), rgba(17, 18, 48, .96));
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }
    .card::after {
      content:""; position:absolute; inset:0; pointer-events:none;
      background: linear-gradient(120deg, rgba(255,255,255,.06), transparent 25%, transparent 75%, rgba(255,255,255,.03));
    }
    .login { padding: clamp(24px, 5vw, 54px); max-width: 720px; margin: 0 auto; }
    .crest { width: 84px; height: 84px; border-radius: 24px; display: grid; place-items: center; margin: 0 auto 14px; font-size: 42px; background: linear-gradient(145deg, #795cff, #35267d); border: 2px solid rgba(255,233,145,.7); box-shadow: 0 0 30px rgba(125,92,255,.45); }
    h1, h2, p { margin-top: 0; }
    .title { text-align: center; font-size: clamp(30px, 6vw, 54px); margin-bottom: 6px; letter-spacing: .04em; }
    .subtitle { text-align: center; color: var(--muted); margin-bottom: 26px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .field.full { grid-column: 1 / -1; }
    label { display:block; font-weight: 800; margin-bottom: 7px; color: var(--gold-2); }
    input {
      width:100%; min-height:52px; border-radius:14px; border:1px solid rgba(255,255,255,.18); background: rgba(255,255,255,.09); color:#fff; padding: 0 14px; outline:none;
    }
    input:focus { border-color: var(--purple-2); box-shadow: 0 0 0 4px rgba(155,119,255,.18); }
    .primary {
      width:100%; min-height:56px; border:0; border-radius:15px; margin-top:18px; color:#17112d; font-weight:900; font-size:20px; cursor:pointer;
      background: linear-gradient(180deg, #ffe98c, #ffc43d); box-shadow: 0 8px 0 #b97818, 0 14px 26px rgba(255,192,48,.2);
    }
    .primary:active { transform: translateY(4px); box-shadow: 0 4px 0 #b97818; }

    .game-card { min-height: min(820px, calc(100vh - 36px)); display:flex; flex-direction:column; }
    .game-card.bg-1 { background-image: linear-gradient(180deg, rgba(8,10,30,.45), rgba(8,10,30,.68)), url('stage1-bg.jpg'); background-size: cover; background-position: center; }
    .game-card.bg-2 { background-image: linear-gradient(180deg, rgba(20,10,30,.45), rgba(20,10,30,.68)), url('stage2-bg.jpg'); background-size: cover; background-position: center; }
    .game-card.bg-3 { background-image: linear-gradient(180deg, rgba(10,10,35,.45), rgba(10,10,35,.68)), url('stage3-bg.jpg'); background-size: cover; background-position: center; }

    .topbar { display:grid; grid-template-columns:auto 1fr auto; gap:14px; align-items:center; padding:14px 18px; background: rgba(5,7,28,.72); border-bottom:1px solid var(--line); }
    .stage-chip { font-weight:900; white-space:nowrap; }
    .student { color:var(--muted); font-size:14px; text-align:right; }
    .power-wrap { display:flex; align-items:center; justify-content:center; gap:10px; min-width:0; }
    .power-label { font-size:12px; font-weight:900; letter-spacing:.05em; white-space:nowrap; }
    .bar { display:grid; grid-template-columns: repeat(10, minmax(12px, 30px)); gap:4px; }
    .seg { height:17px; border-radius:4px; border:1px solid rgba(255,255,255,.28); background:#17192d; box-shadow: inset 0 2px 3px rgba(0,0,0,.5); }
    .seg.on { background:linear-gradient(180deg,#ffe469,#ffb91c); border-color:#fff1a4; box-shadow:0 0 10px rgba(255,195,43,.45); }
    .count { color:var(--gold); font-weight:900; min-width:38px; }
    .content { flex:1; display:grid; place-items:center; padding: clamp(18px, 4vw, 42px); position:relative; z-index:1; }
    .challenge { width:min(900px,100%); text-align:center; }
    .ribbon { display:inline-block; padding:9px 28px; margin-bottom:20px; background:linear-gradient(180deg,#7456d5,#4b319e); clip-path:polygon(6% 0,94% 0,100% 50%,94% 100%,6% 100%,0 50%); font-weight:900; font-size:clamp(20px,3vw,30px); }
    .instruction { color:#e8e3f8; font-weight:800; margin-bottom:20px; }
    .sound-btn { width:104px; height:104px; border-radius:50%; border:3px solid #fff5bd; background:linear-gradient(145deg,#7a5de0,#3f2b97); color:#fff; font-size:48px; cursor:pointer; box-shadow:0 0 28px rgba(111,82,230,.55); margin: 6px auto 24px; }
    .prompt-box { width:min(480px, 100%); margin: 0 auto 22px; background:#fff8ea; color:#211d26; border:5px solid #ead5bd; border-radius:16px; padding:25px 18px; font-weight:900; font-size:clamp(28px,5vw,44px); box-shadow:0 12px 22px rgba(0,0,0,.24); }
    .options { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .option { min-height:74px; border-radius:14px; border:3px solid #e8d5bd; background:#fffaf1; color:#201d22; padding:12px 16px; font-weight:900; font-size:clamp(17px,2.5vw,24px); cursor:pointer; box-shadow:0 5px 0 #b99063; }
    .option small { display:block; font-size:.72em; font-weight:700; color:#5f5661; margin-top:2px; }
    .option.correct { background:#c8f29a; border-color:#75c743; box-shadow:0 5px 0 #498d27; }
    .option.wrong { background:#ffafa7; border-color:#e56559; box-shadow:0 5px 0 #a83d36; }
    .option:disabled { cursor:default; }
    .feedback { min-height:36px; margin-top:17px; font-size:22px; font-weight:900; }
    .feedback.ok { color:#a9f77d; }
    .feedback.bad { color:#ff9a90; }

    .memory { width:min(1000px,100%); }
    .memory-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; }
    .memory-card { aspect-ratio: 1 / .83; min-height:62px; border-radius:10px; border:2px solid #e0ae3d; background:radial-gradient(circle at 50% 42%, #9a7cff 0 8%, #4b347e 9% 20%, #16133f 21% 100%); color:#fff; font-weight:900; cursor:pointer; padding:6px; overflow-wrap:anywhere; }
    .memory-card.revealed { background:#fffaf1; color:#211d27; border-color:#f0d3a7; }
    .memory-card.matched { visibility:hidden; pointer-events:none; }
    .memory-card .back { font-size:26px; }
    .memory-card .face { display:none; font-size:clamp(12px,1.7vw,18px); }
    .memory-card.revealed .back { display:none; }
    .memory-card.revealed .face { display:block; }

    .result { padding:clamp(24px,5vw,52px); text-align:center; }
    .mission { font-size:clamp(38px,7vw,72px); color:var(--gold); margin:6px 0 10px; text-shadow:0 4px 0 #8b4e16; }
    .score-box { width:min(520px,100%); margin:24px auto; background:rgba(7,10,36,.65); border:2px solid rgba(255,211,92,.65); border-radius:20px; padding:24px; }
    .final-label { color:var(--gold-2); font-weight:900; letter-spacing:.08em; }
    .score { font-size:clamp(64px,12vw,110px); line-height:1; color:#ffe17a; font-weight:950; margin:10px 0; text-shadow:0 5px 0 #9d5f1e; }
    .stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; color:#ded9ed; }
    .stats div { background:rgba(255,255,255,.06); padding:13px; border-radius:12px; }
    .play-again { width:min(360px,100%); }
    .notice { color:var(--muted); font-size:13px; margin-top:14px; }

    @media (max-width: 760px) {
      .app { padding:8px; }
      .game-card { min-height:calc(100vh - 16px); border-radius:16px; }
      .topbar { grid-template-columns:1fr auto; }
      .power-wrap { grid-column:1 / -1; grid-row:2; }
      .student { font-size:12px; }
      .form-grid, .options { grid-template-columns:1fr; }
      .content { padding:16px 12px 24px; }
      .memory-grid { gap:5px; }
      .memory-card { min-height:48px; border-radius:7px; padding:3px; }
      .stats { grid-template-columns:1fr; }
    }
    @media (max-width: 430px) {
      .bar { gap:2px; }
      .seg { height:14px; }
      .memory-card .face { font-size:10px; }
      .memory-card .back { font-size:18px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="shell">
      <section id="loginScreen" class="card login">
        <div class="crest">✨</div>
        <h1 class="title">三關單字挑戰</h1>
        <p class="subtitle">完成三個關卡，累積連續答對進度！</p>
        <form id="loginForm">
          <div class="form-grid">
            <div class="field"><label for="className">班級</label><input id="className" required maxlength="12" placeholder="例如：701" autocomplete="off"></div>
            <div class="field"><label for="seatNo">座號</label><input id="seatNo" required maxlength="4" inputmode="numeric" placeholder="例如：12" autocomplete="off"></div>
            <div class="field full"><label for="studentName">姓名</label><input id="studentName" required maxlength="20" placeholder="請輸入姓名" autocomplete="off"></div>
          </div>
          <button id="startBtn" class="primary" type="button">START GAME</button>
        </form>
        
      </section>

      <section id="gameScreen" class="card game-card hidden" aria-live="polite">
        <header class="topbar">
          <div id="stageChip" class="stage-chip">STAGE 1/3</div>
          <div class="power-wrap">
            <span class="power-label">WORD POWER</span>
            <div id="progressBar" class="bar" aria-label="連續答對進度"></div>
            <span id="progressCount" class="count">0/10</span>
          </div>
          <div id="studentInfo" class="student"></div>
        </header>
        <div id="gameContent" class="content"></div>
      </section>

      <section id="resultScreen" class="card result hidden">
        <div class="ribbon">挑戰完成！</div>
        <h2 class="mission">MISSION COMPLETE!</h2>
        <p id="resultStudent" class="subtitle"></p>
        <div class="score-box">
          <div class="final-label">FINAL SCORE</div>
          <div id="finalScore" class="score">3000</div>
          <div class="stats">
            <div>總答錯次數<br><strong id="mistakeCount">0</strong></div>
            <div>完成關卡<br><strong>3 / 3</strong></div>
          </div>
        </div>
        <button id="playAgain" class="primary play-again">PLAY AGAIN</button>
      </section>
    </div>
  </main>

<script src="vocab.js"></script>
<script>
(() => {
  'use strict';

  const VOCAB = VOCAB_RAW.map(([en, zh], id) => ({ id, en, zh }));

  const $ = (s) => document.querySelector(s);
  const loginScreen = $('#loginScreen');
  const gameScreen = $('#gameScreen');
  const resultScreen = $('#resultScreen');
  const gameContent = $('#gameContent');
  const progressBar = $('#progressBar');
  const progressCount = $('#progressCount');
  const stageChip = $('#stageChip');

  const state = {
    student: null,
    stage: 1,
    streak: 0,
    mistakes: 0,
    current: null,
    locked: false,
    memory: null
  };

  function shuffle(arr) {
    const copy = [...arr];
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }
  function sample(arr, n) { return shuffle(arr).slice(0, n); }
  function displayEnglish(text) {
    const sentenceLike = /[.!?]$/.test(text.trim()) || /^(How|Here|Of|I|You)\b/.test(text);
    return sentenceLike ? text : text.toLowerCase();
  }
  function escapeHtml(value) {
    return String(value).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
  }
  function setScreen(which) {
    loginScreen.classList.toggle('hidden', which !== 'login');
    gameScreen.classList.toggle('hidden', which !== 'game');
    resultScreen.classList.toggle('hidden', which !== 'result');
  }
  function renderProgress() {
    progressBar.innerHTML = Array.from({length:10}, (_,i) => `<span class="seg ${i < state.streak ? 'on' : ''}"></span>`).join('');
    progressCount.textContent = `${state.streak}/10`;
  }
  function updateHeader() {
    const names = ['','🎵 STAGE 1/3','📖 STAGE 2/3','⭐ STAGE 3/3'];
    stageChip.textContent = names[state.stage];
    $('#studentInfo').textContent = `${state.student.className}班 ${state.student.seatNo}號 ${state.student.name}`;
    gameScreen.classList.remove('bg-1', 'bg-2', 'bg-3');
    gameScreen.classList.add(`bg-${state.stage}`);
    renderProgress();
  }
  function randomQuestion() {
    let pick;
    do {
      pick = VOCAB[Math.floor(Math.random() * VOCAB.length)];
    } while (VOCAB.length > 1 && state.current && pick.id === state.current.id);
    return pick;
  }
  function distractorsFor(target, field, count=3) {
    const seen = new Set([target[field]]);
    const out = [];
    for (const item of shuffle(VOCAB)) {
      if (!seen.has(item[field])) { seen.add(item[field]); out.push(item); }
      if (out.length === count) break;
    }
    return out;
  }
  function speak(text) {
    if (!('speechSynthesis' in window)) {
      feedback('此瀏覽器不支援語音播放。', false); return;
    }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text.replace(/…/g,''));
    u.lang = 'en-US'; u.rate = 0.82; u.pitch = 1;
    window.speechSynthesis.speak(u);
  }
  function feedback(text, ok) {
    const el = $('#feedback');
    if (!el) return;
    el.className = `feedback ${ok ? 'ok' : 'bad'}`;
    el.textContent = text;
  }
  function advanceStage() {
    if (state.stage < 3) {
      state.stage += 1; state.streak = 0; state.current = null; state.locked = false;
      updateHeader(); renderStage();
    } else {
      showResult();
    }
  }
  function onCorrect(nextFn) {
    state.streak += 1; renderProgress(); feedback('Great! 連續答對 +1', true);
    if (state.streak >= 10) { setTimeout(advanceStage, 650); }
    else { setTimeout(nextFn, 650); }
  }
  function onWrong() {
    state.mistakes += 1; state.streak = 0; renderProgress(); feedback('Try again! 進度歸零。', false);
  }

  function renderStage() {
    if (state.stage === 1) renderListening();
    else if (state.stage === 2) renderWordChoice();
    else renderMemory();
  }

  function renderListening() {
    state.current = randomQuestion(); state.locked = false;
    const options = shuffle([state.current, ...distractorsFor(state.current,'zh')]);
    gameContent.innerHTML = `
      <div class="challenge">
        <div class="ribbon">STAGE 1 聽力辨識</div>
        <h2>Listening Challenge</h2>
        <p class="instruction">Listen and choose the correct meaning.</p>
        <button id="soundBtn" class="sound-btn" aria-label="播放或重播單字">🔊</button>
        <div class="options">
          ${options.map(o => `<button class="option" data-id="${o.id}">${escapeHtml(displayEnglish(o.en))}<small>${escapeHtml(o.zh)}</small></button>`).join('')}
        </div>
        <div id="feedback" class="feedback"></div>
      </div>`;
    $('#soundBtn').addEventListener('click', () => speak(state.current.en));
    gameContent.querySelectorAll('.option').forEach(btn => btn.addEventListener('click', () => {
      if (state.locked) return;
      const chosen = Number(btn.dataset.id);
      if (chosen === state.current.id) {
        state.locked = true; btn.classList.add('correct');
        gameContent.querySelectorAll('.option').forEach(b => b.disabled = true);
        onCorrect(renderListening);
      } else {
        btn.classList.add('wrong'); btn.disabled = true; onWrong();
      }
    }));
    setTimeout(() => speak(state.current.en), 350);
  }

  function renderWordChoice() {
    state.current = randomQuestion(); state.locked = false;
    const options = shuffle([state.current, ...distractorsFor(state.current,'zh')]);
    gameContent.innerHTML = `
      <div class="challenge">
        <div class="ribbon">STAGE 2 中英配對</div>
        <h2>Word Challenge</h2>
        <p class="instruction">Choose the correct meaning.</p>
        <div class="prompt-box">${escapeHtml(displayEnglish(state.current.en))}</div>
        <div class="options">
          ${options.map(o => `<button class="option" data-id="${o.id}">${escapeHtml(o.zh)}</button>`).join('')}
        </div>
        <div id="feedback" class="feedback"></div>
      </div>`;
    gameContent.querySelectorAll('.option').forEach(btn => btn.addEventListener('click', () => {
      if (state.locked) return;
      const chosen = Number(btn.dataset.id);
      if (chosen === state.current.id) {
        state.locked = true; btn.classList.add('correct');
        gameContent.querySelectorAll('.option').forEach(b => b.disabled = true);
        onCorrect(renderWordChoice);
      } else {
        btn.classList.add('wrong'); btn.disabled = true; onWrong();
      }
    }));
  }

  function buildMemoryBoard() {
    const pairs = sample(VOCAB, 18);
    const cards = shuffle(pairs.flatMap(item => [
      { pairId:item.id, type:'en', text:displayEnglish(item.en) },
      { pairId:item.id, type:'zh', text:item.zh }
    ])).map((c, index) => ({...c, uid:index, matched:false}));
    state.memory = { cards, first:null, busy:false, matchedPairs:0 };
  }
  function renderMemory() {
    if (!state.memory) buildMemoryBoard();
    const m = state.memory;
    gameContent.innerHTML = `
      <div class="memory challenge">
        <div class="ribbon">STAGE 3 記憶翻牌</div>
        <h2>Memory Challenge</h2>
        <p class="instruction">Flip the cards and find the matching English–Chinese pairs.</p>
        <div class="memory-grid">
          ${m.cards.map(c => `<button class="memory-card ${c.matched?'matched':''}" data-uid="${c.uid}" aria-label="翻牌"><span class="back">✦</span><span class="face">${escapeHtml(c.text)}</span></button>`).join('')}
        </div>
        <div id="feedback" class="feedback"></div>
      </div>`;
    gameContent.querySelectorAll('.memory-card:not(.matched)').forEach(btn => btn.addEventListener('click', () => flipCard(Number(btn.dataset.uid))));
  }
  function flipCard(uid) {
    const m = state.memory;
    if (!m || m.busy) return;
    const card = m.cards.find(c => c.uid === uid);
    const btn = gameContent.querySelector(`[data-uid="${uid}"]`);
    if (!card || card.matched || btn.classList.contains('revealed')) return;
    btn.classList.add('revealed');
    if (!m.first) { m.first = card; return; }
    const first = m.first;
    const firstBtn = gameContent.querySelector(`[data-uid="${first.uid}"]`);
    m.busy = true;
    const isMatch = first.pairId === card.pairId && first.type !== card.type;
    if (isMatch) {
      first.matched = true; card.matched = true; m.matchedPairs += 1; m.first = null;
      setTimeout(() => {
        firstBtn.classList.add('matched'); btn.classList.add('matched'); m.busy = false;
        state.streak += 1; renderProgress(); feedback('Great! 已成功配對 +1', true);
        if (state.streak >= 10) setTimeout(advanceStage, 650);
      }, 450);
    } else {
      state.mistakes += 1; renderProgress(); feedback('Try again! 配對失敗，但答對進度會保留。', false);
      setTimeout(() => {
        firstBtn.classList.remove('revealed'); btn.classList.remove('revealed'); m.first = null; m.busy = false;
      }, 850);
    }
  }

  function showResult() {
    window.speechSynthesis?.cancel();
    const score = 3000 - state.mistakes * 100;
    $('#finalScore').textContent = score.toLocaleString('en-US');
    $('#mistakeCount').textContent = state.mistakes;
    $('#resultStudent').textContent = `${state.student.className}班 ${state.student.seatNo}號 ${state.student.name}`;
    setScreen('result');
  }
  function startGame() {
    state.stage = 1; state.streak = 0; state.mistakes = 0; state.current = null; state.locked = false; state.memory = null;
    setScreen('game'); updateHeader(); renderStage();
  }

  $('#startBtn').addEventListener('click', () => {
    state.student = {
      className: $('#className').value.trim(),
      seatNo: $('#seatNo').value.trim(),
      name: $('#studentName').value.trim()
    };
    if (!state.student.className || !state.student.seatNo || !state.student.name) {
      alert('請填寫班級、座號與姓名再開始遊戲！');
      return;
    }
    startGame();
  });
  $('#playAgain').addEventListener('click', startGame);
})();
</script>
</body>
</html>
